<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Plutus-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans flex items-center justify-center">
    
    <div class="bg-gray-900 border border-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="flex items-center gap-3 mb-6 justify-center">
            <div class="w-10 h-10 rounded bg-emerald-500 flex items-center justify-center font-bold text-gray-900 text-xl">P</div>
            <h1 class="text-2xl font-semibold tracking-wide">Plutus-AI <span class="text-sm text-emerald-400 align-top">PRO</span></h1>
        </div>
        
        <h2 class="text-xl text-center mb-6 text-gray-300">Secure Terminal Access</h2>
        
        {% if form.errors %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-2 rounded mb-6 text-sm text-center">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" class="w-full bg-gray-800 border border-gray-700 rounded py-3 px-4 text-gray-100 focus:outline-none focus:border-emerald-500" required autofocus>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" class="w-full bg-gray-800 border border-gray-700 rounded py-3 px-4 text-gray-100 focus:outline-none focus:border-emerald-500" required>
            </div>
            
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg transition mt-2 shadow-md">
                Authenticate
            </button>
        </form>

        <div class="mt-6 flex items-center justify-center gap-4">
            <div class="h-px bg-gray-800 flex-1"></div>
            <span class="text-xs text-gray-500 uppercase font-semibold">Or continue with</span>
            <div class="h-px bg-gray-800 flex-1"></div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 py-2.5 rounded-lg transition text-sm">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button class="flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 py-2.5 rounded-lg transition text-sm">
                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
                </svg>
                GitHub
            </button>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8">
            New user? <a href="{% url 'register' %}" class="text-emerald-400 hover:text-emerald-300 font-medium">Create an account</a>
        </p>
    </div>

</body>
</html>
